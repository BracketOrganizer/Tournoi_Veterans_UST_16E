import { getAuth, onAuthStateChanged, signInWithEmailAndPassword,
         createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider,
         signOut, updateProfile }   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, getDocs, setDoc, deleteDoc, onSnapshot, collection,
         addDoc, updateDoc, serverTimestamp, query, orderBy }
                                    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCDKgq7NWknOORUwLilkdHnCG6cet6VMZ4",
  authDomain: "tournoi-veterans.firebaseapp.com",
  projectId: "tournoi-veterans",
  storageBucket: "tournoi-veterans.firebasestorage.app",
  messagingSenderId: "474870610264",
  appId: "1:474870610264:web:9c760aad4eafff97c28d2d"
};
// ⚠️ Remplacez les valeurs ci-dessus par celles de VOTRE projet Firebase.
// Cette appli réutilise les MÊMES collections Firestore (foottournoi,
// teamRosters, tag 'foot16') que l'appli "Foot Entreprises 24 équipes", pour
// rester compatible avec vos règles de sécurité Firestore existantes sans
// rien avoir à modifier dans la Console Firebase.
// ⚠️ IMPORTANT : les deux tournois partagent donc le même document
// 'foottournoi/current'. Ne faites JAMAIS tourner les deux applis en même
// temps (saisie de scores, etc.) sous peine d'écraser les données de l'une
// avec celles de l'autre.

const app       = initializeApp(firebaseConfig);
const auth      = getAuth(app);
const db        = getFirestore(app);
const gProvider = new GoogleAuthProvider();

// ══════════════════════════════════════════════════════════
// ÉTAT GLOBAL — Vétérans UST (16 équipes, 4 poules de 4)
let CURRENT_USER = null;
let USER_ROLE    = null;
let MANAGER_TEAM_ID = null;
let unsubTournament = null;
let unsubRoster = null;

const ST = {
  page:1, prevPage:1, rulesOpen:false,
  teams:[],
  pools:{A:[],B:[],C:[],D:[]},
  poolSchedule:[],
  poolTabSlot:null,
  poolBreaks:[],
  bracketSchedule:[],
  bracketTabSlots:[],
  bracketBreaks:[],
  results:{},
  activeView:'pools',
  activePoolRound:0,
  activeBracketRound:1,
  liveOpen:false,
  phase:'pools',
  timerSec:0, timerRun:false, timerMode:'match', timerIv:null,
  cfg:{
    n:16,
    courts:4,
    matchDur:12,
    matchDurBracket:12,
    tt:4,
    start:'09:00',
    breaks:[ { time:'12:00', duration:45, label:'Pause déjeuner' } ],
    tabDuration:10,
    draw:'order'
  }
};

function isAdmin()  { return USER_ROLE === 'admin'; }
function isScorer() { return USER_ROLE === 'admin' || USER_ROLE === 'scorer'; }
function isManager(){ return USER_ROLE === 'manager'; }
function isLiveBlocked(){ return USER_ROLE === 'spectator' && !ST.liveOpen; }

function addMinutes(timeStr, mins){
  const [h,m] = (timeStr||'09:00').split(':').map(Number);
  const total = h*60 + m + Math.round(mins);
  const hh = Math.floor(total/60)%24;
  const mm = total%60;
  return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}
function timeToMinutes(timeStr){
  const [h,m] = (timeStr||'09:00').split(':').map(Number);
  return h*60+m;
}

// ══════════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════════
// ✅ Fonction SÉCURISÉE : ne lit /users/{userId} que si l'utilisateur est connecté
async function getUserProfile(uid) {
  if (!uid) return null; // ✅ Si pas de UID (anonyme), on retourne null SANS lire Firestore
  try {
    const snap = await getDoc(doc(db, 'users', uid));
    if (snap.exists()) {
      const d = snap.data();
      if (d.role === 'manager' && d.tournament !== 'foot16') {
        return { role: 'spectator', teamId: null };
      }
      return d;
    }
    return null;
  } catch (e) {
    console.error('getUserProfile: échec de lecture du profil.', e);
    return null;
  }
}

// ✅ Fonction SÉCURISÉE : initialise le document utilisateur UNIQUEMENT si connecté
async function ensureUserDoc(user) {
  if (!user) return;
  try {
    const ref = doc(db, 'users', user.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, {
        email: user.email,
        name: user.displayName || user.email.split('@')[0],
        role: 'spectator',
        tournament: 'foot16',
        createdAt: serverTimestamp()
      });
    }
  } catch (e) {
    console.warn('ensureUserDoc: connexion Firestore indisponible.', e);
  }
}

// ✅ Gestion de l'état d'authentification (corrigé pour les anonymes)
onAuthStateChanged(auth, async (user) => {
  if (user) {
    CURRENT_USER = user;
    await ensureUserDoc(user);
    const profile = await getUserProfile(user.uid);
    if (profile) {
      USER_ROLE = profile.role;
      MANAGER_TEAM_ID = profile.teamId;
    } else {
      USER_ROLE = 'spectator';
      MANAGER_TEAM_ID = null;
    }

    // ✅ Vérifie /liveStatus/foot16 pour les spectateurs
    if (USER_ROLE === 'spectator') {
      try {
        const liveStatusSnap = await getDoc(doc(db, 'liveStatus', 'foot16'));
        ST.liveOpen = liveStatusSnap.exists() ? liveStatusSnap.data().liveOpen === true : false;
      } catch (e) {
        ST.liveOpen = false;
      }
      if (!ST.liveOpen) {
        await signOut(auth);
        CURRENT_USER = null;
        USER_ROLE = null;
        MANAGER_TEAM_ID = null;
        showLogin();
        showAuthMsg('⏰ Le live n\'est pas encore ouvert.', 'red');
        return;
      }
    }
    showApp();
    subscribeToTournament();
    if (USER_ROLE === 'manager' && MANAGER_TEAM_ID) subscribeToRoster(MANAGER_TEAM_ID);
  } else {
    // ✅ Mode anonyme : écoute /liveStatus/foot16 pour afficher le live si ouvert
    CURRENT_USER = null;
    USER_ROLE = null;
    MANAGER_TEAM_ID = null;
    unsubAll();
    try {
      const liveStatusSnap = await getDoc(doc(db, 'liveStatus', 'foot16'));
      ST.liveOpen = liveStatusSnap.exists() ? liveStatusSnap.data().liveOpen === true : false;
    } catch (e) {
      ST.liveOpen = false;
    }
    showLogin();
  }
});

function unsubAll(){
  if(unsubTournament){ unsubTournament(); unsubTournament=null; }
  if(unsubRoster){ unsubRoster(); unsubRoster=null; }
}

window.loginEmail = async function(){
  const email = document.getElementById('li_email').value.trim();
  const pwd   = document.getElementById('li_pwd').value;
  if(!email||!pwd){ showAuthMsg('Remplissez email et mot de passe.','red'); return; }
  try { await signInWithEmailAndPassword(auth, email, pwd); }
  catch(e){ showAuthMsg(authErrMsg(e.code),'red'); }
};
window.loginGoogle = async function(){
  try { await signInWithPopup(auth, gProvider); }
  catch(e){ showAuthMsg(authErrMsg(e.code),'red'); }
};
window.logout = async function(){
  clearInterval(ST.timerIv); unsubAll();
  USER_ROLE = null; CURRENT_USER = null;
  if(auth.currentUser) await signOut(auth);
  else showLogin();
};

function authErrMsg(code){
  const map = {
    'auth/invalid-email':'Email invalide.',
    'auth/user-not-found':'Aucun compte avec cet email.',
    'auth/wrong-password':'Mot de passe incorrect.',
    'auth/invalid-credential':'Identifiants incorrects.',
    'auth/too-many-requests':'Trop de tentatives, réessayez plus tard.',
    'auth/popup-closed-by-user':'Connexion annulée.'
  };
  return map[code] || 'Erreur de connexion.';
}
function showAuthMsg(msg,color){
  const el=document.getElementById('authMsg'); if(!el) return;
  el.textContent=msg; el.style.color = color==='red' ? 'var(--red)' : 'var(--grn)';
}

window.enterLiveModeAndGo = function(target){
  if(target !== 'R' && !ST.liveOpen){
    const overlay = document.getElementById('liveClosedOverlay');
    if(overlay) overlay.style.display='flex';
    return;
  }
  USER_ROLE = 'spectator';
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = '';
  const specNav = document.getElementById('specNav');
  if(specNav) specNav.classList.add('visible');
  const stepNav = document.getElementById('stepNav');
  if(stepNav) stepNav.style.display = 'none';
  applyRoleUI();
  if(target === 'R'){ toggleRules(); }
  else if(target === 'T'){ goTo('T'); }
  else { goTo(target); }
};

// ══════════════════════════════════════════════════════════
// PERSISTANCE FIRESTORE — doc unique 'foottournoi/current'
// ══════════════════════════════════════════════════════════
// ✅ Écoute /foottournoi/current UNIQUEMENT si liveOpen == true OU utilisateur autorisé
function subscribeToTournament() {
  if (USER_ROLE === 'spectator') {
    const liveStatusRef = doc(db, 'liveStatus', 'foot16');
    unsubTournament = onSnapshot(liveStatusRef, (liveSnap) => {
      ST.liveOpen = liveSnap.exists() ? liveSnap.data().liveOpen === true : false;
      if (ST.liveOpen) {
        const tournamentRef = doc(db, 'foottournoi', 'current');
        onSnapshot(tournamentRef, (snap) => {
          if (!snap.exists()) return;
          const data = snap.data();
          if (data.cfg) ST.cfg = data.cfg;
          if (data.teams) ST.teams = data.teams;
          if (data.pools) ST.pools = data.pools;
          if (data.poolSchedule) ST.poolSchedule = data.poolSchedule;
          ST.poolTabSlot = data.poolTabSlot || null;
          ST.poolBreaks = data.poolBreaks || [];
          if (data.bracketSchedule) ST.bracketSchedule = data.bracketSchedule;
          ST.bracketTabSlots = data.bracketTabSlots || [];
          ST.bracketBreaks = data.bracketBreaks || [];
          if (data.results) ST.results = data.results;
          if (data.phase) ST.phase = data.phase;
          refreshCurrentPage();
        });
      }
    });
  } else {
    unsubTournament = onSnapshot(doc(db, 'foottournoi', 'current'), (snap) => {
      if (!snap.exists()) return;
      const data = snap.data();
      if (data.cfg) ST.cfg = data.cfg;
      if (data.teams) ST.teams = data.teams;
      if (data.pools) ST.pools = data.pools;
      if (data.poolSchedule) ST.poolSchedule = data.poolSchedule;
      ST.poolTabSlot = data.poolTabSlot || null;
      ST.poolBreaks = data.poolBreaks || [];
      if (data.bracketSchedule) ST.bracketSchedule = data.bracketSchedule;
      ST.bracketTabSlots = data.bracketTabSlots || [];
      ST.bracketBreaks = data.bracketBreaks || [];
      if (data.results) ST.results = data.results;
      if (data.phase) ST.phase = data.phase;
      ST.liveOpen = data.liveOpen === true;
      refreshCurrentPage();
    });
  }
}

async function saveTournament(partial){
  if(!isAdmin() && !isScorer()) return;
  try { await setDoc(doc(db,'foottournoi','current'), { ...partial, updatedAt: serverTimestamp() }, { merge:true }); }
  catch(e){ console.error('saveTournament', e); alert('Erreur de sauvegarde : '+e.message); }
}
function refreshCurrentPage(){
  if(ST.page===2) renderTeamsPage();
  if(ST.page===3) renderPlanningPreview();
  if(ST.page===4) renderTournamentPage();
  if(ST.page===5) renderFinalPage();
  if(ST.page==='T') renderTeamsSpecPage();
  if(ST.page==='M') renderManagerPage();
}

// ✅ Met à jour /liveStatus/foot16 au lieu de /foottournoi/current.liveOpen
window.toggleLiveOpen = async function() {
  if (!isAdmin()) return;
  try {
    const liveStatusRef = doc(db, 'liveStatus', 'foot16');
    const liveSnap = await getDoc(liveStatusRef);
    const currentStatus = liveSnap.exists() ? liveSnap.data().liveOpen : false;
    await setDoc(liveStatusRef, { liveOpen: !currentStatus }, { merge: true });
    ST.liveOpen = !currentStatus;
    updateLiveToggleBtn();
  } catch (e) {
    console.error("Erreur lors de la mise à jour du statut live :", e);
  }
};

function updateLiveToggleBtn(){
  const btn=document.getElementById('liveToggleBtn');
  if(!btn) return;
  btn.textContent = ST.liveOpen ? '🟢 Live ouvert (spectateurs)' : '🔴 Live fermé (spectateurs)';
  btn.style.background = ST.liveOpen ? 'var(--grn-bg)' : 'var(--red-bg)';
  btn.style.color = ST.liveOpen ? 'var(--grn)' : 'var(--red)';
  btn.style.borderColor = ST.liveOpen ? 'var(--grn)' : 'var(--red)';
}

// ══════════════════════════════════════════════════════════
// GESTION DU STAFF — changer les rôles (admin / scorer / spectator)
// ══════════════════════════════════════════════════════════
window.toggleUsersPanel = function(){
  if(!isAdmin()) return;
  const p=document.getElementById('usersPanel');
  if(!p) return;
  const show = p.style.display==='none';
  p.style.display = show ? '' : 'none';
  if(show){
    loadUsersList();
    populateNewStaffTeamSelect();
  }
};

function populateNewStaffTeamSelect(){
  const sel=document.getElementById('newStaffTeamId'); if(!sel) return;
  const limit=ST.cfg.n||ST.teams.length;
  const teams=ST.teams.slice(0,limit);
  sel.innerHTML = teams.length
    ? teams.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')
    : `<option value="">— Aucune équipe créée —</option>`;
}

window.loadUsersList = async function(){
  if(!isAdmin()) return;
  const el=document.getElementById('usersList');
  if(el) el.innerHTML='<div class="info info-b" style="font-size:12px">Chargement…</div>';
  try {
    const snap = await getDocs(collection(db,'users'));
    const users=[];
    snap.forEach(d=>users.push({ id:d.id, ...d.data() }));
    users.sort((a,b)=>(a.email||'').localeCompare(b.email||''));
    renderUsersList(users);
  } catch(e){
    console.error('loadUsersList', e);
    if(el) el.innerHTML=`<div class="info info-r" style="font-size:12px">Erreur de chargement : ${e.message}<br>Vérifiez que les règles Firestore autorisent la lecture de la collection 'users' pour un admin.</div>`;
  }
};

function renderUsersList(users){
  const el=document.getElementById('usersList'); if(!el) return;
  if(!users.length){ el.innerHTML='<div class="info info-y" style="font-size:12px">Aucun compte enregistré pour le moment (les comptes apparaissent ici après leur 1ère connexion).</div>'; return; }
  const roleColor = r => r==='admin' ? 'var(--red)' : r==='scorer' ? 'var(--blu)' : r==='manager' ? 'var(--ylw)' : 'var(--muted)';
  const limit=ST.cfg.n||ST.teams.length;
  const teams=ST.teams.slice(0,limit);
  el.innerHTML = users.map(u=>
    `<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--bdr);font-size:13px;flex-wrap:wrap">
      <div style="flex:1;min-width:160px">
        <div style="font-weight:700;color:var(--ink)">${u.name||u.email||u.id}</div>
        <div style="font-size:11px;color:var(--muted)">${u.email||'—'}\${u.role==='manager'&&u.teamId?' · '+tName(u.teamId):''}</div>
      </div>
      <span style="font-size:11px;font-weight:700;color:\${roleColor(u.role)};text-transform:uppercase;letter-spacing:.5px;min-width:90px">${u.role||'spectator'}</span>
      <select onchange="changeUserRole('${u.id}', this.value)" style="width:auto;min-width:140px" title="Changer le rôle de \${u.email||u.id}">
        <option value="spectator" \${u.role==='spectator'||!u.role?'selected':''}>👁 Spectateur</option>
        <option value="scorer" \${u.role==='scorer'?'selected':''}>✏️ Scorer (saisie scores)</option>
        <option value="manager" \${u.role==='manager'?'selected':''}>🛡️ Responsable d'équipe</option>
        <option value="admin" \${u.role==='admin'?'selected':''}>👑 Admin</option>
      </select>
      \${u.role==='manager' ? `<select onchange="changeUserTeam('\${u.id}', this.value)" style="width:auto;min-width:140px" title="Changer l'équipe gérée">
        \${teams.map(t=>`<option value="${t.id}" ${t.id===u.teamId?'selected':''}>${t.name}</option>`).join('')}
      </select>` : ''}
      <button class="btn btn-ghost btn-xs" style="color:var(--red);border-color:var(--red)" onclick="deleteStaffAccount('${u.id}','${(u.name||u.email||u.id).replace(/'/g,"\\'")}')" title="Supprimer ce compte">🗑 Supprimer</button>
    </div>`).join('');
}

window.changeUserRole = async function(userId, newRole){
  if(!isAdmin()) return;
  try {
    const patch = { role: newRole };
    if(newRole!=='manager'){ patch.teamId = null; patch.tournament = null; }
    else { patch.tournament = 'foot16'; }
    await updateDoc(doc(db,'users',userId), patch);
    loadUsersList();
  } catch(e){
    console.error('changeUserRole', e);
    alert('Erreur lors du changement de rôle : '+e.message);
  }
};

window.changeUserTeam = async function(userId, teamId){
  if(!isAdmin()) return;
  try {
    await updateDoc(doc(db,'users',userId), { teamId });
    loadUsersList();
  } catch(e){
    console.error('changeUserTeam', e);
    alert('Erreur lors du changement d\'équipe : '+e.message);
  }
};

window.deleteStaffAccount = async function(userId, label){
  if(!isAdmin()) return;
  if(CURRENT_USER && CURRENT_USER.uid===userId){ alert('Vous ne pouvez pas supprimer votre propre compte admin connecté.'); return; }
  if(!confirm(`Supprimer le compte de "\${label}" ?
Cette personne perdra immédiatement ses droits (admin/scorer). Elle pourra théoriquement se reconnecter en tant que spectateur avec son ancien mot de passe — pour bloquer totalement l'accès, supprimez aussi son compte dans la console Firebase (Authentication).`)) return;
  try {
    await deleteDoc(doc(db,'users',userId));
    loadUsersList();
  } catch(e){
    console.error('deleteStaffAccount', e);
    alert('Erreur lors de la suppression : '+e.message);
  }
};

window.createStaffAccount = async function(){
  if(!isAdmin()) return;
  const name      = document.getElementById('newStaffName').value.trim();
  const email     = document.getElementById('newStaffEmail').value.trim();
  const pwd       = document.getElementById('newStaffPwd').value;
  const role      = document.getElementById('newStaffRole').value;
  const teamId    = document.getElementById('newStaffTeamId') ? document.getElementById('newStaffTeamId').value : null;
  const adminPwd  = document.getElementById('adminPwdConfirm').value;
  const msgEl     = document.getElementById('newStaffMsg');
  const setMsg = (txt,color)=>{ if(msgEl){ msgEl.textContent=txt; msgEl.style.color = color==='red'?'var(--red)':'var(--grn)'; } };

  if(!name||!email||!pwd){ setMsg('Remplissez nom, email et mot de passe.','red'); return; }
  if(pwd.length<6){ setMsg('Le mot de passe doit faire au moins 6 caractères.','red'); return; }
  if(role==='manager' && !teamId){ setMsg('Sélectionnez l\'équipe gérée par ce responsable.','red'); return; }
  if(!adminPwd){ setMsg('Indiquez votre propre mot de passe admin pour la reconnexion automatique.','red'); return; }

  const adminEmail = CURRENT_USER ? CURRENT_USER.email : null;
  if(!adminEmail){ setMsg('Reconnectez-vous en admin (email/mot de passe) avant de créer un compte staff.','red'); return; }

  setMsg('Création en cours…','grn');
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pwd);
    const newUid = cred.user.uid;
    await updateProfile(cred.user, { displayName: name });

    const userDoc = { email, name, role, createdAt: serverTimestamp(), createdBy: adminEmail };
    if(role==='manager'){ userDoc.teamId = teamId; userDoc.tournament = 'foot16'; }
    await setDoc(doc(db,'users',newUid), userDoc);

    await signInWithEmailAndPassword(auth, adminEmail, adminPwd);

    setMsg(`✓ Compte staff créé pour ${name} (${roleBadge(role)}${role==='manager'?' — '+tName(teamId):''}). Vous êtes reconnecté en admin.`,'grn');
    document.getElementById('newStaffName').value='';
    document.getElementById('newStaffEmail').value='';
    document.getElementById('newStaffPwd').value='';
    document.getElementById('adminPwdConfirm').value='';
    loadUsersList();
  } catch(e){
    console.error('createStaffAccount', e);
    setMsg('Erreur : '+authErrMsg(e.code)+(e.code?'':(' '+e.message)),'red');
    if(auth.currentUser && auth.currentUser.email !== adminEmail){
      setMsg('Compte staff créé, mais la reconnexion admin a échoué (mot de passe admin incorrect ?). Reconnectez-vous manuellement.','red');
    }
  }
};

function syncDrawerButtons(){
  [['liveBtn','drawerLiveBtn'],['adminBtn','drawerAdminBtn'],['managerBtn','drawerManagerBtn'],['backBtn','drawerBackBtn'],['fwdBtn','drawerFwdBtn'],['logoutBtn','drawerLogoutBtn']].forEach(([deskId,drawId])=>{
    const desk=document.getElementById(deskId); const draw=document.getElementById(drawId);
    if(desk&&draw) draw.style.display=desk.style.display==='none'?'none':'';;
  });
}
window.goToLive = function(){ goTo(4); closeMobileMenu(); };

// ══════════════════════════════════════════════════════════
// PAGE 1 — CONFIG
// ══════════════════════════════════════════════════════════
let _breaksDraft = [{ time:'12:00', duration:45, label:'Pause déjeuner' }];

function renderBreaksList(){
  const el = document.getElementById('breaksList'); if(!el) return;
  if(!_breaksDraft.length){
    el.innerHTML = '<div class="info info-y" style="font-size:12px">Aucune coupure prévue.</div>';
    return;
  }
  el.innerHTML = _breaksDraft.map((b,i)=>

function getCfg(){

function renderCfgForm(){
  const c = ST.cfg;
  const setV=(id,v)=>{ const el=document.getElementById(id); if(el) el.value=v; };
  setV('cfg_n', c.n);
  setV('cfg_courts', c.courts);
  setV('cfg_matchdur', c.matchDur);
  setV('cfg_matchdur_bracket', c.matchDurBracket);
  setV('cfg_tt', c.tt);
  setV('cfg_start', c.start);
  setV('cfg_draw', c.draw||'order');
  setV('cfg_tabdur', c.tabDuration||10);
  _breaksDraft = (c.breaks && c.breaks.length) ? c.breaks.map(b=>({...b})) : [{ time:'12:00', duration:45, label:'Pause déjeuner' }];

window.onCfgChange = function(){
  const n = +(document.getElementById('cfg_n')?.value||16);
  const courts = +(document.getElementById('cfg_courts')?.value||4);
  const matchDur = +(document.getElementById('cfg_matchdur')?.value||12);
  const tt = +(document.getElementById('cfg_tt')?.value||4);

  const numPools=4, teamsPerPool=Math.ceil(n/numPools);
  const journees = teamsPerPool - (teamsPerPool%2===0?1:0) || teamsPerPool-1;
  const matchesPerJournee = numPools * Math.floor(teamsPerPool/2);
  const slotsNeeded = Math.ceil(matchesPerJournee/courts) * Math.max(1,journees);
  const poolDuration = (slotsNeeded+1) * (matchDur+tt);

  const bracketSlots = Math.ceil(8/courts)*3 + 3;
  const bracketDuration = bracketSlots*(matchDur+tt);

  const infoEl = document.getElementById('cfg_info');
  if(infoEl){
    infoEl.className='info info-b';
    infoEl.innerHTML = `🏟️ <strong>\${n} équipes</strong> réparties en <strong>4 poules</strong> de \${teamsPerPool} · <strong>${courts} terrain${courts>1?'s':''}</strong><br>
    📅 Phase de poules : ~<strong>${journees} journées</strong> + créneau T.A.B., durée estimée <strong>${Math.round(poolDuration/60*10)/10}h</strong><br>
    🏆 Phase finale : <strong>24 matchs</strong> (3 tours) + créneaux T.A.B., durée estimée <strong>\${Math.round(bracketDuration/60*10)/10}h</strong>`;
  }

  const start=document.getElementById('cfg_start')?.value||'09:00';
  const totalDuration = poolDuration + bracketDuration;
  const breaksTotal = _breaksDraft.reduce((s,b)=>s+(b.duration||0),0);
  const estEnd = addMinutes(start, totalDuration + breaksTotal);
  const el = document.getElementById('cfgPreview');
  if(el){
    el.className='info info-g';
    const breaksTxt = _breaksDraft.length
      ? _breaksDraft.map(b=>`☕ ${b.label} ~${b.time} (${b.duration} min)`).join(' · ')
      : 'Aucune coupure';
    el.innerHTML=`☀️ Début : \${start} · ⏱ match poules \${matchDur} min / finale \${+(document.getElementById('cfg_matchdur_bracket')?.value||12)} min · transition \${tt} min<br>
    \${breaksTxt}<br>
    🏁 Fin estimée ~\${estEnd} (estimation, les coupures réelles se caleront sur les créneaux)`;
  }
};

  (ST.poolBreaks||[]).forEach(b=>{ (breaksAfter[b.afterSlot]=breaksAfter[b.afterSlot]||[]).push(b); });

function tObj(id){ return ST.teams.find(t=>t.id===id); }
function tName(id){ const t=tObj(id); return t?t.name:'?'; }
function tClub(id){ const t=tObj(id); return t?(t.club||'—'):'—'; }

function buildTeamProgram(tid){
  const rows=[];
  ST.poolSchedule.filter(m=>m.a===tid||m.b===tid).forEach(m=>{
    const opp = m.a===tid?m.b:m.a;
    const r=getPoolResult(m.matchId);
    const done=r.ga!==''&&r.gb!=='';
    const isA=m.a===tid;
    const myS=done?(isA?r.ga:r.gb):'', oppS=done?(isA?r.gb:r.ga):'';
    rows.push({ phase:'Poule '+m.pool, time:m.time, court:'T'+m.court, opp, myS, oppS, done });
  });
  ST.bracketSchedule.filter(b=>{
    const a=bracketTeam(b.m,'a'), bb=bracketTeam(b.m,'b');
    return a===tid || bb===tid;
  }).forEach(b=>{
    const a=bracketTeam(b.m,'a'), bteam=bracketTeam(b.m,'b');
    const isA = a===tid;
    const opp = isA?bteam:a;
    const r=getBracketResult(b.m);
    const done=r.ga!==''&&r.gb!=='';
    const myS=done?(isA?r.ga:r.gb):'', oppS=done?(isA?r.gb:r.ga):'';
    rows.push({ phase:bracketLabel(b.m), time:b.time, court:'T'+b.court, opp, myS, oppS, done });
  });
  return rows;
}

function renderPoolsView(){
  const el=document.getElementById('poolsView'); if(!el) return;
  const bracketEl=document.getElementById('bracketView'); if(bracketEl) bracketEl.style.display='none';
  el.style.display='';

  const bySlot={};
  ST.poolSchedule.forEach(m=>{ (bySlot[m.slot]=bySlot[m.slot]||[]).push(m); });
  const slots=Object.keys(bySlot).map(Number).sort((a,b)=>a-b);
  const TAB_SLOT_KEY = 'TAB';

  const tabsEl=document.getElementById('poolSlotTabs');
  if(tabsEl){
    let html = slots.map(s=>{
      const matches=bySlot[s];
      const done = matches.every(m=>{ const r=getPoolResult(m.matchId); return r.ga!==''&&r.gb!==''; });
      return `<button class="rtab ${s===ST.activePoolRound?'active':''} ${done?'done':''}" onclick="setPoolSlot(${s})">Créneau ${s+1}${done?' ✓':''}<span class="rtab-time">${matches[0].time}</span></button>`;
    }).join('');

    }
    tabsEl.innerHTML = html;
  }

  const listEl = document.getElementById('poolMatchList');
  if(ST.activePoolRound===TAB_SLOT_KEY){
    let html = poolTabSummaryHTML();
    const breaksAfterTab = ST.poolTabSlot ? (ST.poolBreaks||[]).filter(b=>b.afterSlot===ST.poolTabSlot.slot) : [];
    breaksAfterTab.forEach(b=>{
      html += `<div style="background:rgba(180,60,60,.08);border:1px dashed #b43c3c;border-radius:8px;padding:10px 14px;margin-top:4px">
        <div style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:#b43c3c;margin-bottom:2px">🕐 \${b.startTime} – ${b.endTime}</div>

  }

  const matches = bySlot[ST.activePoolRound]||[];
  if(listEl){
    let html = matches.map(m=>{
      const r=getPoolResult(m.matchId);
      const needsShootout = poolMatchNeedsShootout(m.matchId, m.pool);
      return matchCardHTML('pool', m.matchId, m.a, m.b, r, `Poule ${m.pool}`, m.court, m.time, needsShootout);
    }).join('');
    const breaksAfter = (ST.poolBreaks||[]).filter(b=>b.afterSlot===ST.activePoolRound);
    breaksAfter.forEach(b=>{
      html += `<div style="background:rgba(180,60,60,.08);border:1px dashed #b43c3c;border-radius:8px;padding:10px 14px;margin-top:4px">
        <div style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:#b43c3c;margin-bottom:2px">🕐 \${b.startTime} – ${b.endTime}</div>

      </div>`;
    });
    listEl.innerHTML = html;
  }

  renderPoolStandingsPanel();
}

    return `<div style="background:var(--s1);border:1px solid var(--ylw);border-radius:10px;padding:12px 14px;margin-bottom:8px">
      <div style="font-size:11px;color:var(--dim);margin-bottom:8px">Poule \${p}</div>

function renderBracketView(){
  const poolsEl=document.getElementById('poolsView'); if(poolsEl) poolsEl.style.display='none';
  const el=document.getElementById('bracketView'); if(!el) return;
  el.style.display='';

  const tabsEl=document.getElementById('bracketRoundTabs');
  if(tabsEl){
    tabsEl.innerHTML = [1,2,3].map(r=>{
      const matches = ST.bracketSchedule.filter(b=>b.round===r);
      const done = matches.length && matches.every(b=>bracketMatchWinner(b.m)!=null);
      const label = r===1?'Tour 1':r===2?'Tour 2':'Classement final';
      return `<button class="rtab ${r===ST.activeBracketRound?'active':''} ${done?'done':''}" onclick="setBracketRound(${r})">${label}${done?' ✓':''}</button>`;
    }).join('');
  }

  const matches = ST.bracketSchedule.filter(b=>b.round===ST.activeBracketRound);
  const tabSlotsForRound = (ST.bracketTabSlots||[]).filter(t=>t.round===ST.activeBracketRound);
  const listEl = document.getElementById('bracketMatchList');
  if(listEl){
    if(!matches.length){
      listEl.innerHTML='<div class="info info-y">Phase finale non générée.</div>';
    } else {
      const bySlot = {};
      matches.forEach(b=>{ (bySlot[b.slot]=bySlot[b.slot]||[]).push(b); });
      const breaksAfter = {};
      (ST.bracketBreaks||[]).forEach(b=>{ (breaksAfter[b.afterSlot]=breaksAfter[b.afterSlot]||[]).push(b); });
      const allSlotNums = [...new Set([...matches.map(b=>b.slot), ...tabSlotsForRound.map(t=>t.slot)])].sort((a,b)=>a-b);
      let html = allSlotNums.map(s=>{
        let block = '';
        if(bySlot[s]){
          block = bySlot[s].map(b=>{
            const a=bracketTeam(b.m,'a'), bb=bracketTeam(b.m,'b');
            const r=getBracketResult(b.m);
            const label = b.label || bracketLabel(b.m);
            const needsShootout = r.ga!==''&&r.gb!==''&&(+r.ga===+r.gb);
            return matchCardHTML('bracket', b.m, a, bb, r, label, b.court, b.time, needsShootout);
          }).join('');
        } else {
          const tabSlot = tabSlotsForRound.find(t=>t.slot===s);
          if(tabSlot){
            block = `<div style="background:var(--ylw-bg);border:1px dashed var(--ylw);border-radius:8px;padding:10px 14px;margin:4px 0">
              <div style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:var(--ylw);margin-bottom:2px">🕐 ${tabSlot.time}</div>

            </div>`;
          }

        if(breaksAfter[s]){
          block += breaksAfter[s].map(b=>`<div style="background:rgba(180,60,60,.08);border:1px dashed #b43c3c;border-radius:8px;padding:10px 14px;margin:4px 0">

            <div style="font-size:12px">☕ <strong>${b.label}</strong> (${b.duration} min)</div>
          </div>`).join('');
        }
        return block;
      }).join('');
      listEl.innerHTML = html;
    }
  }
}

// ── Carte de match (saisie score) ────────────────────────
const _scoreDebounce = {};
function matchCardHTML(type, matchId, aId, bId, r, subtitle, court, time, needsShootout){
  const aName = aId?tName(aId):'<em>à déterminer</em>';
  const bName = bId?tName(bId):'<em>à déterminer</em>';
  const canEdit = isScorer() && aId && bId;
  const done = r.ga!==''&&r.gb!=='';
  let shootoutHTML='';
  if(needsShootout){
    const so=r.shootout||{};
    shootoutHTML = `<div style="margin-top:6px;padding:6px 10px;background:var(--ylw-bg);border-radius:6px;font-size:11px">
      ⚽ <strong>Égalité — Tirs au but requis</strong> <span style="color:var(--muted)">(ne compte pas au classement, désigne juste le vainqueur)</span>
      \${canEdit?`<div style="display:flex;gap:6px;align-items:center;margin-top:4px">
        <input type="number" min="0" max="20" value="\${so.ga??''}" style="width:50px" id="so_a_\${matchId}" title="Tirs au but équipe A" aria-label="Tirs au but équipe A" onfocus="this.select()" oninput="scheduleAutoSaveShootout('${type}',${matchId})">
        <span>–</span>
        <input type="number" min="0" max="20" value="\${so.gb??''}" style="width:50px" id="so_b_\${matchId}" title="Tirs au but équipe B" aria-label="Tirs au but équipe B" onfocus="this.select()" oninput="scheduleAutoSaveShootout('${type}',${matchId})">
        <span id="so_status_\${matchId}" style="font-size:10px;color:var(--muted)"></span>
      </div>`:(so.ga!=null?`<strong>\${so.ga} – \${so.gb}</strong> T.A.B.`:'En attente de saisie')}
    </div>`;
  }
  return `<div style="background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;margin-bottom:8px">
    <div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:6px">
      <div style="font-size:11px;color:var(--dim)">${subtitle}${court?` · T${court}`:''}</div>
      ${time?`<div style="font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:var(--blu)">🕐 ${time}</div>`:''}
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="flex:1;font-weight:700">${aName}</div>
      \${canEdit ?
        `<input type="number" min="0" max="50" value="\${r.ga}" style="width:50px;text-align:center" id="sc_a_\${type}_\${matchId}" title="Score équipe A" aria-label="Score équipe A" onfocus="this.select()" oninput="scheduleAutoSaveScore('${type}',${matchId})">
        <span>–</span>
        <input type="number" min="0" max="50" value="\${r.gb}" style="width:50px;text-align:center" id="sc_b_\${type}_\${matchId}" title="Score équipe B" aria-label="Score équipe B" onfocus="this.select()" oninput="scheduleAutoSaveScore('${type}',${matchId})">`
        : `<div style="font-family:'Oswald',sans-serif;font-size:18px">${done?`\${r.ga} – \${r.gb}`:'–'}</div>`}
      <div style="flex:1;text-align:right;font-weight:700">\${bName}</div>
    </div>
    \${canEdit?`<div style="font-size:10px;color:var(--muted);margin-top:4px;text-align:right" id="sc_status_${type}_${matchId}"></div>`:''}
    \${shootoutHTML}
  </div>`;
}

window.scheduleAutoSaveScore = function(type, matchId){
  const key = type+'_'+matchId;
  clearTimeout(_scoreDebounce[key]);
  const statusEl = document.getElementById(`sc_status_${type}_${matchId}`);
  if(statusEl) statusEl.textContent='…';
  _scoreDebounce[key] = setTimeout(async ()=>{
    const aEl=document.getElementById(`sc_a_${type}_${matchId}`), bEl=document.getElementById(`sc_b_${type}_${matchId}`);
    if(!aEl||!bEl) return;
    const ga=aEl.value, gb=bEl.value;
    if(ga===''||gb===''){ if(statusEl) statusEl.textContent=''; return; }
    if(type==='pool') await setPoolResult(matchId, +ga, +gb);
    else await setBracketResult(matchId, +ga, +gb, null);
    if(statusEl) statusEl.textContent='✓ Enregistré';
    refreshCurrentPage();
  }, 800);
};

window.scheduleAutoSaveShootout = function(type, matchId){
  const key = 'so_'+type+'_'+matchId;
  clearTimeout(_scoreDebounce[key]);
  const statusEl = document.getElementById(`so_status_${matchId}`);
  if(statusEl) statusEl.textContent='…';
  _scoreDebounce[key] = setTimeout(async ()=>{
    const aEl=document.getElementById(`so_a_${matchId}`), bEl=document.getElementById(`so_b_${matchId}`);
    if(!aEl||!bEl) return;
    const ga=aEl.value, gb=bEl.value;
    if(ga===''||gb===''){ if(statusEl) statusEl.textContent=''; return; }
    if(+ga===+gb){ if(statusEl){ statusEl.textContent='⚠ Il faut un vainqueur (scores différents)'; statusEl.style.color='var(--red)'; } return; }
    if(type==='pool') await setPoolShootout(matchId, { ga:+ga, gb:+gb });
    else {
      const r = getBracketResult(matchId);
      await setBracketResult(matchId, r.ga, r.gb, { ga:+ga, gb:+gb });
    }
    if(statusEl){ statusEl.style.color='var(--muted)'; statusEl.textContent='✓ Enregistré'; }
    refreshCurrentPage();
  }, 800);
};

function computeFinalRanking(){
  const ranking = [];
  const placeMap = {
    24:{w:1,l:2}, 23:{w:3,l:4}, 22:{w:5,l:6}, 21:{w:7,l:8},
    20:{w:9,l:10}, 19:{w:11,l:12}, 18:{w:13,l:14}, 17:{w:15,l:16},
  };
  Object.entries(placeMap).forEach(([m,{w,l}])=>{
    const mm=+m;
    const winner=bracketMatchWinner(mm), loser=bracketMatchLoser(mm);
    if(winner) ranking.push({ place:w, teamId:winner });
    if(loser)  ranking.push({ place:l, teamId:loser });
  });
  ranking.sort((a,b)=>a.place-b.place);
  return ranking;
}
function renderFinalPage(){
  const el=document.getElementById('finalRankingTable'); if(!el) return;
  const ranking = computeFinalRanking();
  if(!ranking.length){
    el.innerHTML='<div class="info info-y">Le classement final s\'affichera une fois la phase finale jouée.</div>';
    return;
  }
  el.innerHTML = `<table class="stbl" style="width:100%">
    <thead><tr><th>Place</th><th>Équipe</th></tr></thead>
    <tbody>\${ranking.map(r=>`<tr class="\${r.place<=3?'podium-'+r.place:''}">
      <td style="font-weight:700">${r.place===1?'🥇':r.place===2?'🥈':r.place===3?'🥉':r.place}</td>
      <td>${tName(r.teamId)}</td>
    </tr>`).join('')}</tbody>
  </table>`;
  const completedCount = ranking.length;
  const totalCount = ST.teams.slice(0,ST.cfg.n).length;
  const infoEl=document.getElementById('finalInfo');
  if(infoEl) infoEl.innerHTML = completedCount<totalCount
    ? `<div class="info info-y">⏳ ${completedCount}/${totalCount} places déterminées — tournoi en cours.</div>`
    : `<div class="info info-g">🏆 Tournoi terminé ! Classement complet.</div>`;
}
window.printFinalRanking = function(){

  const rows = ranking.map(r=>`<tr><td style="padding:6px 10px;font-weight:700">${r.place}</td><td style="padding:6px 10px">${tName(r.teamId)}</td></tr>`).join('');
  const win=window.open('','_final','width=700,height=800');

function fmt(s){ return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

  return ST.activeView==='bracket' ? (ST.cfg.matchDurBracket||12) : (ST.cfg.matchDur||12);

function updateTimerDisplay(){
  const el=document.getElementById('tmrDsp'); if(!el) return;
  const s=ST.timerSec;
  el.textContent=fmt(s);
  el.className='timer-big '+(s===0?'tc-zero':ST.timerMode==='match'?'tc-match':'tc-trans');

  if(ST.timerRun){ if(s===0) _playSiren(2.5,0.9); else if(s===30) _playWarn30(); else if(s>=1&&s<=5) _playCountdownBeep(s===1); }
}
window.startTimer = function(mode){

// ── AUDIO (Web Audio API — sirène fin de match, alertes) ────
let _AC=null, _soundEnabled=true;
function _getAC(){ if(!_AC||_AC.state==='closed'){ try{ _AC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){ _AC=null; } } if(_AC&&_AC.state==='suspended') _AC.resume(); return _AC; }
function _playTone(freq,dur,type='sine',attack=0.01,vol=0.8,startDelay=0){ const ac=_getAC(); if(!ac||!_soundEnabled) return; const t=ac.currentTime+startDelay; const osc=ac.createOscillator(); const gain=ac.createGain(); osc.connect(gain);gain.connect(ac.destination);osc.type=type;osc.frequency.setValueAtTime(freq,t);gain.gain.setValueAtTime(0,t);gain.gain.linearRampToValueAtTime(vol,t+attack);gain.gain.setValueAtTime(vol,t+dur-0.05);gain.gain.linearRampToValueAtTime(0,t+dur);osc.start(t);osc.stop(t+dur); }
function _playSiren(durationSec=2.5,vol=0.9){ const ac=_getAC(); if(!ac||!_soundEnabled) return; const t=ac.currentTime; for(let i=0;i<3;i++){ const osc=ac.createOscillator(); const gain=ac.createGain(); osc.connect(gain);gain.connect(ac.destination);osc.type='sawtooth';const cd=durationSec/3;const s=t+i*cd;osc.frequency.setValueAtTime(400,s);osc.frequency.linearRampToValueAtTime(900,s+cd*0.6);osc.frequency.linearRampToValueAtTime(600,s+cd);gain.gain.setValueAtTime(0,s);gain.gain.linearRampToValueAtTime(vol,s+0.03);gain.gain.setValueAtTime(vol,s+cd-0.05);gain.gain.linearRampToValueAtTime(0,s+cd);osc.start(s);osc.stop(s+cd+0.01); } }
function _playWarn30(){ if(!_soundEnabled) return; for(let rep=0;rep<2;rep++){ _playTone(880,0.12,'sine',0.005,0.75,rep*0.55); _playTone(1100,0.15,'sine',0.005,0.75,rep*0.55+0.18); } }
function _playCountdownBeep(isLast){ if(!_soundEnabled) return; if(isLast){ _playTone(660,0.08,'square',0.005,0.8);_playTone(880,0.10,'square',0.005,0.8,0.12); }else _playTone(660,0.08,'square',0.005,0.65); }
function _unlockAudio(){ _getAC(); const ac=_AC; if(!ac) return; const buf=ac.createBuffer(1,1,22050); const src=ac.createBufferSource(); src.buffer=buf;src.connect(ac.destination);src.start(0); }
window.toggleSound = function(){ _soundEnabled=!_soundEnabled; const btn=document.getElementById('soundToggle'); if(btn) btn.textContent=_soundEnabled?'🔊':'🔇'; _getAC(); };

window.drawPools = function(){
  if(!isAdmin()) return;
  const n = ST.cfg.n||16;
  const teams = ST.teams.slice(0,n);
  if(teams.length < 8){ alert('Il faut au moins 8 équipes pour former 4 poules.'); return; }
  const numPools = 4;
  const poolNames = ['A','B','C','D'];
  let ordered;

  if(ST.cfg.draw==='order'){
    ordered = [...teams];
  } else if(ST.cfg.draw==='random'){
    ordered = shuffle(teams);
  } else {
    ordered = drawAvoidingClubs(teams, numPools);
  }

  const pools = {A:[],B:[],C:[],D:[]};
  if(ST.cfg.draw==='random-no-club'){
    poolNames.forEach((p,i)=>{ pools[p]=ordered[i].map(t=>t.id); });
  } else {
    ordered.forEach((t,i)=>{ pools[poolNames[i%numPools]].push(t.id); });
  }
  ST.pools = pools;
  saveTournament({ pools, phase:'pools' });
  renderTeamsPage();
};

function drawAvoidingClubs(teams, numPools){
  const shuffled = shuffle(teams);
  const pools = Array.from({length:numPools},()=>[]);
  shuffled.forEach(t=>{
    const club = t.club||'—';
    let candidates = pools
      .map((p,i)=>({i,p}))
      .filter(({p})=> club==='—' || !p.some(x=>x.club===club));
    if(candidates.length===0) candidates = pools.map((p,i)=>({i,p}));
    candidates.sort((a,b)=>a.p.length-b.p.length);
    candidates[0].p.push(t);
  });
  return pools;
}

// ══════════════════════════════════════════════════════════
// GÉNÉRATION DU CALENDRIER DE POULES
// ══════════════════════════════════════════════════════════
function roundRobinPairs(ids){
  const n = ids.length;
  const list = [...ids];
  if(n%2===1) list.push(null);
  const rounds = [];
  const half = list.length/2;
  for(let r=0;r<list.length-1;r++){
    const pairs=[];
    for(let i=0;i<half;i++){
      const a=list[i], b=list[list.length-1-i];
      if(a!=null && b!=null) pairs.push([a,b]);
    }
    rounds.push(pairs);
    list.splice(1,0,list.pop());
  }
  return rounds;
}

window.buildPoolSchedule = function(){
  if(!isAdmin()) return;
  const pools = ST.pools;
  if(!pools.A.length){ alert('Effectuez d\'abord le tirage des poules.'); return; }
  const cfg = ST.cfg;
  const courts = cfg.courts||4;

  const poolRounds = {};
  ['A','B','C','D'].forEach(p=>{ poolRounds[p] = roundRobinPairs(pools[p]); });

  const numJournees = Math.max(...Object.values(poolRounds).map(r=>r.length));
  let matchNum=1;
  const allMatches=[];
  for(let j=0;j<numJournees;j++){
    const maxMatchesInJournee = Math.max(...['A','B','C','D'].map(p=>(poolRounds[p][j]||[]).length));
    for(let mi=0; mi<maxMatchesInJournee; mi++){
      ['A','B','C','D'].forEach(p=>{
        const pair = (poolRounds[p][j]||[])[mi];
        if(pair){
          const [a,b]=pair;
          allMatches.push({ journee:j, poolMatchIdx:mi, pool:p, a, b, matchId:matchNum++ });
        }
      });
    }
  }
  const rawSchedule=[];
  let slotIdx=0;
  for(let j=0;j<numJournees;j++){
    const journeeMatches = allMatches.filter(m=>m.journee===j);
    for(let i=0;i<journeeMatches.length;i+=courts){
      const slot = journeeMatches.slice(i,i+courts);
      slot.forEach((m,ci)=>{ rawSchedule.push({ ...m, court:ci+1, slot:slotIdx }); });
      slotIdx++;
    }
  }
  const tabSlotIdx = slotIdx;
  const totalSlots = slotIdx+1;
  const matchSlotDur = cfg.matchDur+cfg.tt;
  const tabDur = cfg.tabDuration||10;
  const slotDurations = Array.from({length:totalSlots}, (_,i)=> i===tabSlotIdx ? tabDur : matchSlotDur);
  const appliedBreaks = new Set();
  const { times: slotTimes, insertedBreaks } = computeSlotTimes(cfg.start, slotDurations, totalSlots, cfg.breaks, appliedBreaks);

  const finalSchedule = rawSchedule.map(m=>({ ...m, time: slotTimes[m.slot] }));

  ST.poolSchedule = finalSchedule;
  ST.poolTabSlot = { time: slotTimes[tabSlotIdx], slot: tabSlotIdx };
  ST.poolBreaks = insertedBreaks;
  ST.results = {};
  ST.phase='pools';
  saveTournament({ poolSchedule: finalSchedule, poolTabSlot: ST.poolTabSlot, poolBreaks: insertedBreaks, results:{}, phase:'pools', bracketSchedule:[] });
  renderPlanningPreview();
};

// ══════════════════════════════════════════════════════════
// CLASSEMENT DE POULE
// ══════════════════════════════════════════════════════════
function getPoolResult(matchId){
  const d = ST.results['pool-'+matchId];
  if(!d) return { ga:'', gb:'', shootout:null };
  return { ga: d.ga??'', gb: d.gb??'', shootout: d.shootout||null };
}
window.setPoolResult = async function(matchId, ga, gb){

function computePoolStandings(pool){
  const ids = ST.pools[pool]||[];
  const stats = {};
  ids.forEach(id=>stats[id]={ id, pts:0, j:0, g:0, n:0, p:0, bp:0, bc:0, diff:0 });
  const matches = ST.poolSchedule.filter(m=>m.pool===pool);
  matches.forEach(m=>{
    const r = getPoolResult(m.matchId);
    if(r.ga==='' || r.gb==='') return;
    const ga=+r.ga, gb=+r.gb;
    const sa=stats[m.a], sb=stats[m.b];
    if(!sa||!sb) return;
    sa.j++; sb.j++;
    sa.bp+=ga; sa.bc+=gb; sb.bp+=gb; sb.bc+=ga;
    if(ga>gb){ sa.pts+=3; sa.g++; sb.p++; }
    else if(ga<gb){ sb.pts+=3; sb.g++; sa.p++; }
    else { sa.pts+=1; sb.pts+=1; sa.n++; sb.n++; }
  });
  Object.values(stats).forEach(s=>s.diff=s.bp-s.bc);

  const arr = Object.values(stats);
  const tiedPairs = tiedPairsForPool(pool);
  arr.sort((a,b)=>{
    if(b.pts!==a.pts) return b.pts-a.pts;
    const tied = arr.filter(x=>x.pts===a.pts);
    if(tied.length===2){
      const direct = matches.find(m=>(m.a===a.id&&m.b===b.id)||(m.a===b.id&&m.b===a.id));
      if(direct){
        const r=getPoolResult(direct.matchId);
        if(r.ga!==''&&r.gb!==''){
          const aIsA = direct.a===a.id;
          const diffDirect = aIsA ? (+r.ga-+r.gb) : (+r.gb-+r.ga);
          if(diffDirect!==0) return -diffDirect;
        }
      }
    }
    if(b.diff!==a.diff) return b.diff-a.diff;
    if(b.bp!==a.bp) return b.bp-a.bp;
    const pair = tiedPairs.find(p=>(p.a===a.id&&p.b===b.id)||(p.a===b.id&&p.b===a.id));
    if(pair){
      const r = getPoolResult(pair.matchId);
      if(r.shootout && r.shootout.ga!=null && r.shootout.gb!=null){
        const aIsPairA = pair.a===a.id;
        const soDiff = aIsPairA ? (r.shootout.ga-r.shootout.gb) : (r.shootout.gb-r.shootout.ga);
        if(soDiff!==0) return -soDiff;
      }
    }
    return 0;
  });
  return arr;
}
function allPoolStandings(){
  const out={};
  ['A','B','C','D'].forEach(p=>out[p]=computePoolStandings(p));
  return out;
}

function findTiedGroups(pool){
  const ids = ST.pools[pool]||[];
  if(ids.length<2) return [];
  const matches = ST.poolSchedule.filter(m=>m.pool===pool);
  const allPlayed = matches.every(m=>{ const r=getPoolResult(m.matchId); return r.ga!==''&&r.gb!==''; });
  if(!allPlayed) return [];

  const stats = {};
  ids.forEach(id=>stats[id]={ id, pts:0, bp:0, bc:0, diff:0 });
  matches.forEach(m=>{
    const r=getPoolResult(m.matchId);
    const ga=+r.ga, gb=+r.gb;
    const sa=stats[m.a], sb=stats[m.b]; if(!sa||!sb) return;
    sa.bp+=ga; sa.bc+=gb; sb.bp+=gb; sb.bc+=ga;
    if(ga>gb) sa.pts+=3; else if(ga<gb) sb.pts+=3; else { sa.pts+=1; sb.pts+=1; }
  });
  Object.values(stats).forEach(s=>s.diff=s.bp-s.bc);

  const groups = {};
  Object.values(stats).forEach(s=>{
    const key = s.pts+'_'+s.diff+'_'+s.bp;
    (groups[key]=groups[key]||[]).push(s.id);
  });
  return Object.values(groups).filter(g=>g.length>=2);
}

function tiedPairsForPool(pool){
  const groups = findTiedGroups(pool);
  if(!groups.length) return [];
  const matches = ST.poolSchedule.filter(m=>m.pool===pool).slice().sort((a,b)=>a.slot-b.slot);
  const pairs=[];
  groups.forEach(group=>{
    matches.forEach(m=>{
      if(group.includes(m.a) && group.includes(m.b)){
        pairs.push({ matchId:m.matchId, a:m.a, b:m.b, group });
      }
    });
  });
  return pairs;
}
function tiedGroupsWithPairsForPool(pool){
  const groups = findTiedGroups(pool);
  if(!groups.length) return [];
  const matches = ST.poolSchedule.filter(m=>m.pool===pool).slice().sort((a,b)=>a.slot-b.slot);
  return groups.map(group=>({
    group,
    pairs: matches.filter(m=>group.includes(m.a) && group.includes(m.b)).map(m=>({ matchId:m.matchId, a:m.a, b:m.b }))
  }));
}

function poolMatchNeedsShootout(matchId, pool){
  return tiedPairsForPool(pool).some(p=>p.matchId===matchId);
}

function poolRankTeam(pool, rank){
  const st = computePoolStandings(pool);
  return st[rank-1] ? st[rank-1].id : null;
}

function bracketMatchWinner(m){
  const r = getBracketResult(m);
  if(r.ga==='' || r.gb==='') return null;
  const ga=+r.ga, gb=+r.gb;
  if(ga>gb) return bracketTeam(m,'a');
  if(ga<gb) return bracketTeam(m,'b');
  if(r.shootout && r.shootout.ga!=null && r.shootout.gb!=null){
    return r.shootout.ga>r.shootout.gb ? bracketTeam(m,'a') : bracketTeam(m,'b');
  }
  return null;
}
function bracketMatchLoser(m){
  const w = bracketMatchWinner(m); if(!w) return null;
  const a=bracketTeam(m,'a'), b=bracketTeam(m,'b');
  return w===a ? b : a;
}
function bracketTeam(m, side){
  const b = BRACKET_BY_NUM[m]; if(!b) return null;
  const slot = b[side];
  if(!slot) return null;
  if(slot.pool){ return poolRankTeam(slot.pool, slot.rank); }
  if(slot.from==='V') return bracketMatchWinner(slot.m);
  if(slot.from==='P') return bracketMatchLoser(slot.m);
  return null;
}

window.generateBracket = function(){
  if(!isAdmin()) return;
  const allDone = ['A','B','C','D'].every(p=>{
    const matches = ST.poolSchedule.filter(m=>m.pool===p);
    return matches.every(m=>{ const r=getPoolResult(m.matchId); return r.ga!==''&&r.gb!=='' ; });
  });
  if(!allDone && !confirm('Tous les matchs de poules ne sont pas terminés. Générer quand même la phase finale (places non qualifiées resteront vides) ?')) return;

  const cfg = ST.cfg;
  const courts = cfg.courts||4;
  if(courts<4){
    alert('La répartition spéciale de la finale (3e-8e place sur les terrains B/C/D puis finale seule sur le terrain A) nécessite au moins 4 terrains. Configurez au moins 4 terrains (page Config) avant de générer la phase finale.');
    return;
  }
  const matchSlotDur = cfg.matchDurBracket+cfg.tt;
  const tabDur = cfg.tabDuration||10;

  const lastPoolTime = ST.poolTabSlot ? ST.poolTabSlot.time
    : (ST.poolSchedule.length ? ST.poolSchedule[ST.poolSchedule.length-1].time : cfg.start);

  const poolTimesForApplied = ST.poolSchedule.map(m=>m.time).concat(ST.poolTabSlot?[ST.poolTabSlot.time]:[]);
  const appliedBreaks = appliedBreaksFromSchedule(poolTimesForApplied, cfg.breaks);

  let start = addMinutes(lastPoolTime, cfg.matchDur+cfg.tt);
  const transitionBreaks = [];
  let scanning = true;
  while(scanning){
    scanning = false;
    const lastPoolMin = timeToMinutes(lastPoolTime), startMin = timeToMinutes(start);
    const pending = (cfg.breaks||[]).slice().sort((a,b)=>timeToMinutes(a.time)-timeToMinutes(b.time));
    for(const brk of pending){
      const key = brk.time+'_'+brk.duration;
      if(appliedBreaks.has(key)) continue;
      const brkMin = timeToMinutes(brk.time);
      if(brkMin>=lastPoolMin && brkMin<startMin){
        appliedBreaks.add(key);
        const fmt = mins => { const hh=Math.floor(mins/60)%24, mm=mins%60; return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0'); };
        const endMin = startMin + brk.duration;
        transitionBreaks.push({ afterSlot: ST.poolTabSlot?ST.poolTabSlot.slot:-1, startTime: fmt(startMin), endTime: fmt(endMin), label: brk.label||'Coupure', duration: brk.duration });
        start = fmt(endMin);
        scanning = true;
        break;
      }
    }
  }
  if(transitionBreaks.length){
    ST.poolBreaks = [...(ST.poolBreaks||[]), ...transitionBreaks];
  }

  const ROUND3_PODIUM_NUMS = [21,22,23];
  const ROUND3_FINAL_NUM   = 24;
  const round3Rest = BRACKET_ROUND3.filter(b=>!ROUND3_PODIUM_NUMS.includes(b.m) && b.m!==ROUND3_FINAL_NUM);

  const rawSchedule=[];
  const tabSlots=[];
  const slotDurations=[];
  let slotIdx=0;

  [BRACKET_ROUND1, BRACKET_ROUND2].forEach((round,ri)=>{
    for(let i=0;i<round.length;i+=courts){
      const slot = round.slice(i,i+courts);
      slot.forEach((b,ci)=>{ rawSchedule.push({ m:b.m, round:ri+1, court:ci+1, slot:slotIdx, label: b.label||null }); });
      slotDurations.push(matchSlotDur);
      slotIdx++;
    }
    tabSlots.push({ round: ri+1, slot: slotIdx });
    slotDurations.push(tabDur);
    slotIdx++;
  });

  for(let i=0;i<round3Rest.length;i+=courts){
    const slot = round3Rest.slice(i,i+courts);
    slot.forEach((b,ci)=>{ rawSchedule.push({ m:b.m, round:3, court:ci+1, slot:slotIdx, label: b.label||null }); });
    slotDurations.push(matchSlotDur);
    slotIdx++;
  }

  const podiumSlotIdx = slotIdx;
  ROUND3_PODIUM_NUMS.forEach((mNum,ci)=>{
    const b = BRACKET_BY_NUM[mNum];
    rawSchedule.push({ m:mNum, round:3, court:ci+2, slot:podiumSlotIdx, label: b.label||null });
  });
  slotDurations.push(matchSlotDur);
  slotIdx++;

  const finalSlotIdx = slotIdx;
  const finalB = BRACKET_BY_NUM[ROUND3_FINAL_NUM];
  rawSchedule.push({ m:ROUND3_FINAL_NUM, round:3, court:1, slot:finalSlotIdx, label: finalB.label||null });
  slotDurations.push(matchSlotDur);
  slotIdx++;

  tabSlots.push({ round: 3, slot: slotIdx, label:'T.A.B. — Finale' });
  slotDurations.push(tabDur);
  slotIdx++;

  const totalSlots = slotIdx;
  const { times: slotTimes, insertedBreaks } = computeSlotTimes(start, slotDurations, totalSlots, cfg.breaks, appliedBreaks);

  const schedule = rawSchedule.map(m=>({ ...m, time: slotTimes[m.slot] }));
  const tabSlotsWithTime = tabSlots.map(t=>({ ...t, time: slotTimes[t.slot] }));

  ST.bracketSchedule = schedule;
  ST.bracketTabSlots = tabSlotsWithTime;
  ST.bracketBreaks = insertedBreaks;
  ST.phase = 'bracket';
  saveTournament({ bracketSchedule: schedule, bracketTabSlots: tabSlotsWithTime, bracketBreaks: insertedBreaks, poolBreaks: ST.poolBreaks, phase:'bracket' });
  renderTournamentPage();
};

// ══════════════════════════════════════════════════════════
// TIMELINE CONTINUE AVEC COUPURES MULTIPLES
// ══════════════════════════════════════════════════════════
function computeSlotTimes(startTime, slotDurations, slotCount, breaks, appliedBreaksSet){
  const durFor = i => Array.isArray(slotDurations) ? (slotDurations[i] ?? slotDurations[slotDurations.length-1]) : slotDurations;
  const sortedBreaks = (breaks||[]).slice().sort((a,b)=>timeToMinutes(a.time)-timeToMinutes(b.time));
  const times = [];
  const insertedBreaks = [];
  let cursor = timeToMinutes(startTime);
  for(let i=0;i<slotCount;i++){
    times.push(cursor);
    const slotEnd = cursor + durFor(i);
    for(const brk of sortedBreaks){
      const key = brk.time+'_'+brk.duration;
      if(appliedBreaksSet.has(key)) continue;
      const brkMin = timeToMinutes(brk.time);
      if(brkMin >= cursor && brkMin < slotEnd){
        appliedBreaksSet.add(key);
        const startMin = slotEnd, endMin = slotEnd + brk.duration;
        const fmt = mins => { const hh=Math.floor(mins/60)%24, mm=mins%60; return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0'); };
        insertedBreaks.push({ afterSlot:i, startTime: fmt(startMin), endTime: fmt(endMin), label: brk.label||'Coupure', duration: brk.duration });
        cursor = endMin;
        break;
      }
    }
    if(cursor === times[i]) cursor = slotEnd;
  }
  const formattedTimes = times.map(mins=>{
    const hh=Math.floor(mins/60)%24, mm=mins%60;
    return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
  });
  return { times: formattedTimes, insertedBreaks };
}

function appliedBreaksFromSchedule(existingTimes, breaks){
  const applied = new Set();
  if(!existingTimes.length) return applied;
  const lastSlotMin = Math.max(...existingTimes.map(timeToMinutes));
  (breaks||[]).forEach(brk=>{
    const brkMin = timeToMinutes(brk.time);
    if(brkMin <= lastSlotMin) applied.add(brk.time+'_'+brk.duration);
  });
  return applied;
}

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

const ROSTERS = {};

function subscribeToRoster(teamId){
  if(unsubRoster){ unsubRoster(); unsubRoster=null; }
  if(!teamId) return;
  unsubRoster = onSnapshot(doc(db,'teamRosters',teamId), (snap)=>{
    ROSTERS[teamId] = snap.exists() ? snap.data() : { players: [] };
    if(ST.page==='M') renderManagerPage();
  }, (e)=>{ console.error('subscribeToRoster', e); });
}

async function getRosterOnce(teamId){
  if(ROSTERS[teamId]) return ROSTERS[teamId];
  try {
    const snap = await getDoc(doc(db,'teamRosters',teamId));
    const data = snap.exists() ? snap.data() : { players: [] };
    ROSTERS[teamId] = data;
    return data;
  } catch(e){
    console.error('getRosterOnce', e);
    return { players: [] };
  }
}

async function saveRoster(teamId, players){
  if(!isAdmin() && !isScorer() && !(isManager() && MANAGER_TEAM_ID===teamId)) return;
  try {
    await setDoc(doc(db,'teamRosters',teamId), { players, updatedAt: serverTimestamp() }, { merge:true });

  } catch(e){
    console.error('saveRoster', e);
    alert('Erreur de sauvegarde de la feuille d\'équipe : '+e.message);

}

.btn-google{ width:100%;padding:10px;background:var(--s2);border:1.5px solid var(--bdr2);border-radius:8px;color:var(--ink);font-family:'Exo 2',sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s; }
.btn-google:hover{ background:var(--s3); }

/* ── HEADER ─────────────────────────────────────────── */
.hdr{ background:var(--s1);border-bottom:2px solid var(--bdr2);padding:0 16px;height:58px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10000;box-shadow:0 2px 12px rgba(0,0,0,.4); }
.hdr-brand{ font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;letter-spacing:1px;color:var(--ink2);white-space:nowrap; }
.hdr-user{ font-size:12px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
.hdr-r{ display:flex;align-items:center;gap:8px; }
.hdr-btn{ background:none;border:1.5px solid var(--bdr2);color:var(--ink);padding:7px 14px;border-radius:8px;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.6px;cursor:pointer;transition:all .15s;white-space:nowrap; }
.hdr-btn:hover{ background:var(--s2);border-color:var(--grn);color:var(--grn); }
@media(max-width:767px){ .hdr-r{ display:none !important; } }
.hdr-menu-btn{ display:none;background:none;border:none;cursor:pointer;padding:8px;border-radius:8px;flex-direction:column;gap:5px; }
@media(max-width:767px){ .hdr-menu-btn{ display:flex; } }
.hdr-menu-btn span{ display:block;width:20px;height:2px;background:var(--ink2);border-radius:2px;transition:all .25s; }
.hdr-menu-btn.open span:nth-child(1){ transform:translateY(7px) rotate(45deg); }
.hdr-menu-btn.open span:nth-child(2){ opacity:0;transform:scaleX(0); }
.hdr-menu-btn.open span:nth-child(3){ transform:translateY(-7px) rotate(-45deg); }
.hdr-drawer{ display:none;position:fixed;top:58px;right:0;width:250px;background:var(--ink2);border-left:1px solid var(--bdr2);border-bottom:1px solid var(--bdr2);border-radius:0 0 0 14px;box-shadow:-4px 4px 24px rgba(0,0,0,.4);z-index:10001;flex-direction:column;padding:8px;gap:4px; }
.hdr-drawer.open{ display:flex;animation:drawerIn .2s ease; }
@keyframes drawerIn{ from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none} }
.hdr-drawer-btn{ background:none;border:none;color:#fff;padding:13px 16px;border-radius:8px;cursor:pointer;font-family:'Exo 2',sans-serif;font-size:14px;font-weight:600;text-align:left;width:100%;display:flex;align-items:center;gap:10px;transition:background .15s; }
.hdr-drawer-btn:hover{ background:rgba(255,255,255,.12); }
.hdr-drawer-btn.drawer-danger{ color:#ff8070; }
.hdr-drawer-sep{ height:1px;background:rgba(255,255,255,.15);margin:4px 0; }
.hdr-drawer-overlay{ display:none;position:fixed;inset:0;z-index:10000; }
.hdr-drawer-overlay.open{ display:block; }

/* ── ADMIN PANEL ─────────────────────────────────────── */
.admin-panel{ background:var(--s1);color:var(--ink);padding:16px 20px;border-bottom:2px solid var(--bdr2);box-shadow:var(--shadow);display:none; }
.admin-panel.open{ display:block; }
.admin-panel-ttl{ font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:1px;color:var(--ylw);margin-bottom:12px; }

/* ── SPECTATOR NAV ───────────────────────────────────── */
.spec-nav{ display:none;background:var(--s1);border-bottom:3px solid var(--bdr2);padding:0 16px;overflow-x:auto; }
.spec-nav.visible{ display:flex;gap:0;align-items:center; }
.spec-nav-btn{ padding:13px 22px;font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;transition:all .15s;margin-bottom:-3px; }
.spec-nav-btn:hover{ color:var(--ink); }
.spec-nav-btn.spec-nav-active{ color:var(--grn);border-bottom-color:var(--grn); }
.spec-nav-live-dot{ width:7px;height:7px;border-radius:50%;background:#ff4444;animation:blink 1.2s ease-in-out infinite;display:inline-block;margin-right:5px; }

/* ── STEPS ───────────────────────────────────────────── */
.steps{ background:var(--s1);border-bottom:2px solid var(--bdr);padding:10px 20px;display:flex;align-items:center;overflow-x:auto;gap:0; }
.step{ display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);white-space:nowrap;cursor:pointer; }
.step.active{ color:var(--grn); }
.step.done{ color:var(--muted); }
.step-n{ width:24px;height:24px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0; }
.step.active .step-n{ background:var(--grn);border-color:var(--grn);color:#fff; }
.step.done .step-n{ background:var(--muted);border-color:var(--muted);color:#fff; }
.step-ln{ width:24px;height:2px;background:var(--bdr);margin:0 4px;flex-shrink:0; }

/* ── PAGES ───────────────────────────────────────────── */
.page{ display:none;animation:fadeIn .2s ease; }
.page.active{ display:block; }
@keyframes fadeIn{ from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none} }
.wrap{ max-width:1040px;margin:0 auto;padding:24px 16px 80px; }

/* ── CARDS ───────────────────────────────────────────── */
.sec-ttl{ font-family:'Oswald',sans-serif;font-size:24px;letter-spacing:1px;color:var(--ink2);margin-bottom:18px;display:flex;align-items:center;gap:10px; }
.sec-ttl::after{ content:'';flex:1;height:2px;background:var(--bdr); }
.card{ background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;box-shadow:var(--shadow); }
.card+.card,.card+.info,.info+.card{ margin-top:14px; }
.card-ttl{ font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:1px;color:var(--ink2);margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--bdr);display:flex;align-items:center;gap:8px;justify-content:space-between; }

/* ── FORMS ───────────────────────────────────────────── */
.fg{ display:grid;gap:13px; }
.fr{ display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px; }
label{ display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:5px; }
input[type=text],input[type=number],input[type=time],input[type=email],input[type=password],select,textarea{ width:100%;padding:9px 12px;background:var(--s2);border:1.5px solid var(--bdr);border-radius:8px;font-family:'Exo 2',sans-serif;font-size:14px;color:var(--ink);outline:none; }
select{ cursor:pointer;background:var(--s1);border:2px solid var(--grn);font-weight:600;box-shadow:0 1px 4px rgba(26,122,58,.15); }
select option{ background:var(--s1);color:var(--ink); }
input:focus,select:focus,textarea:focus{ border-color:var(--grn); }
input[type=checkbox]{ width:auto;margin-right:6px; }

/* ── BUTTONS ─────────────────────────────────────────── */
.btn{ display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border:none;border-radius:8px;font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:.8px;cursor:pointer;transition:all .15s;text-transform:uppercase; }
.btn:disabled{ opacity:.35;cursor:not-allowed; }
.btn-g{ background:var(--grn);color:#fff; }
.btn-g:hover:not(:disabled){ background:var(--grn2); }
.btn-y{ background:var(--ylw);color:#fff; }
.btn-r{ background:var(--red);color:#fff; }
.btn-b{ background:var(--blu);color:#fff; }
.btn-ghost{ background:var(--s2);color:var(--ink);border:1px solid var(--bdr); }
.btn-ghost:hover{ background:var(--s3); }
.btn-sm{ padding:6px 14px;font-size:13px; }
.btn-xs{ padding:4px 10px;font-size:12px; }
.flex{ display:flex; } .g8{ gap:8px; } .fw{ flex-wrap:wrap; } .mt16{ margin-top:16px; }

/* ── INFO BOXES ──────────────────────────────────────── */
.info{ border-radius:var(--r);padding:14px 18px;font-size:13px;color:var(--muted);line-height:1.8;border:1px solid; }
.info-g{ background:var(--grn-bg);border-color:#a0d4b0;border-left:4px solid var(--grn);color:#1a5c30; }
.info-y{ background:var(--ylw-bg);border-color:#d4b060;border-left:4px solid var(--ylw);color:#7a4a08; }
.info-r{ background:var(--red-bg);border-color:#e09090;border-left:4px solid var(--red);color:#802018; }
.info-b{ background:var(--blu-bg);border-color:#90b8e8;border-left:4px solid var(--blu);color:#1040a0; }
.info strong{ font-weight:700;color:inherit; }

/* ── ROUND TABS ──────────────────────────────────────── */
.rtabs{ display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px; }
.rtab{ padding:6px 14px;border-radius:6px;border:1.5px solid var(--bdr);background:var(--s2);font-family:'Oswald',sans-serif;font-size:14px;cursor:pointer;color:var(--muted);transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px; }
.rtab:hover{ border-color:var(--grn);color:var(--grn); }
.rtab.active{ background:var(--grn);border-color:var(--grn);color:#fff; }
.rtab.done{ background:var(--grn-bg);border-color:var(--grn);color:var(--grn); }
.rtab.done.active{ background:var(--grn);color:#fff; }
.rtab-time{ font-size:10px;opacity:.7;font-family:'Exo 2',sans-serif;font-weight:400; }

/* ── TIMER (chrono match) ────────────────────────────── */
.timer-wrap{ background:var(--s2);border-radius:var(--r);padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px;box-shadow:var(--shadow2); }
.timer-lbl{ font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:4px; }
.timer-big{ font-family:'Oswald',sans-serif;font-size:64px;line-height:1;letter-spacing:-2px;font-variant-numeric:tabular-nums;transition:color .3s; }
.timer-big.tc-match{ color:#1a7a3a; }
.timer-big.tc-trans{ color:#b8720a; }
.timer-big.tc-zero{ color:#b02018;animation:blink 1s ease-in-out infinite; }
.timer-btns{ display:flex;flex-direction:column;gap:7px;align-items:flex-end; }

/* ── STANDINGS ───────────────────────────────────────── */
.stbl{ width:100%;border-collapse:collapse;font-size:13px; }
.stbl th{ padding:9px 8px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);background:var(--s2);border-bottom:2px solid var(--bdr);white-space:nowrap; }
.stbl th:nth-child(2){ text-align:left; }
.stbl td{ padding:9px 8px;text-align:center;border-bottom:1px solid var(--bdr); }
.stbl td:nth-child(2){ text-align:left;font-weight:600; }
.podium-1 td{ background:rgba(212,168,32,.12); } .podium-2 td{ background:rgba(112,144,192,.12); } .podium-3 td{ background:rgba(160,96,48,.12); }

/* ── T-CLUB BADGE ────────────────────────────────────── */
.t-club-badge{ display:inline-block;background:var(--grn-bg);color:var(--grn);border:1px solid rgba(26,122,58,.3);border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;margin-left:4px; }

/* ── RULES ───────────────────────────────────────────── */
.rules-section{ margin-bottom:18px; }
.rules-section h4{ font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:.8px;color:var(--ink2);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--bdr); }
.rules-section p,.rules-section li{ font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:4px; }
.rules-section ul{ padding-left:18px; }

/* ── MISC ────────────────────────────────────────────── */
@media(max-width:767px){
  input[type=text],input[type=number],input[type=time],input[type=email],input[type=password],select,textarea{ font-size:16px; }
}
.ovx{ overflow-x:auto;-webkit-overflow-scrolling:touch; }
@keyframes blink{ 0%,100%{opacity:1}50%{opacity:.4} }

@media print{
  body{ background:#fff!important;color:#000!important;font-size:11px; }
  .hdr,.steps,.rtabs,.btn,.hdr-btn,button{ display:none!important; }
  .page{ display:block!important; }
  .wrap{ padding:8px 4px;max-width:100%; }
  .card{ box-shadow:none!important;border:1px solid #ccc!important;break-inside:avoid; }
}
</style>
